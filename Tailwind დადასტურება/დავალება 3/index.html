<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>დავალება 3</title>
</head>
<body class="bg-gradient-to-br from-blue-500 to-purple-200 flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md p-6">
        <form
            class="bg-white/40 p-6 rounded-lg shadow-lg space-y-4
                   focus-within:ring-4 focus-within:ring-blue-300">

            <h2 class="text-2xl font-bold uppercase tracking-wider text-center">
                Registration
            </h2>

            <div>
                <label class="block mb-2 font-semibold">
                    Full Name
                </label>

                <input
                    type="text"
                    placeholder="Enter your name"
                    class="w-full p-3 border rounded-lg
                           focus:outline-none
                           focus:border-blue-500
                           focus:ring-2 focus:ring-blue-300">
            </div>

            <div>
                <label class="block mb-2 font-semibold">
                    Email
                </label>

                <input
                    type="email"
                    placeholder="Enter your email"
                    class="w-full p-3 border rounded-lg
                           focus:outline-none
                           focus:border-blue-500
                           focus:ring-2 focus:ring-blue-300">
            </div>

            <button
                class="w-full bg-blue-500 text-white py-3 rounded-lg
                       hover:bg-blue-700
                       active:scale-95
                       transition">
                Submit
            </button>

            <a href="#"
               class="inline-block no-underline text-blue-600
                      hover:underline hover:text-blue-800">
                Forgot Password?
            </a>

        </form>
    </div>

</body>
</html>
